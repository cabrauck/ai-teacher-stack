services:
  teacher-tools:
    build:
      context: ./services/teacher_tools
    env_file:
      - .env
    ports:
      - "8010:8010"
    volumes:
      - ./data:/app/data
      - ./vault:/app/vault
      - ./exports:/app/exports
    command: ["uv", "run", "uvicorn", "teacher_tools.api:app", "--host", "0.0.0.0", "--port", "8010"]

  qdrant:
    image: qdrant/qdrant:v1.15.4
    profiles: ["rag"]
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
