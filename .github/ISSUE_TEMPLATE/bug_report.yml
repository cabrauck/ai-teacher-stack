name: Bug report
description: Report behavior that is not working as expected.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve ai-teacher-stack. Do not include student names, grades, diagnoses, parent communication, credentials, tokens, confidential school documents, copyrighted textbook content, or private vault/export content.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Describe the failing behavior in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest clear steps that trigger the bug.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened? Paste only non-sensitive logs or output.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Pick the closest affected area.
      options:
        - teacher_tools API
        - Curriculum grounding or search
        - Document export
        - Obsidian vault or memory workflow
        - Schriftwesen or handover
        - Docker Compose or local setup
        - Release packaging
        - Documentation or contributor workflow
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, Docker version, and command used when relevant.
      placeholder: |
        OS:
        Python:
        Docker:
        Command:
    validations:
      required: false
  - type: checkboxes
    id: privacy_check
    attributes:
      label: Privacy check
      options:
        - label: I did not include student names, grades, diagnoses, parent communication, credentials, tokens, confidential school documents, copyrighted textbook content, or private vault/export content.
          required: true
