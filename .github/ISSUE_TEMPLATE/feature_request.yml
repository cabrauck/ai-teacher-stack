name: Feature request
description: Propose a teacher-facing or contributor workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Feature requests should describe teacher workflow impact and product boundaries. Do not include student names, grades, diagnoses, parent communication, credentials, tokens, confidential school documents, copyrighted textbook content, or private vault/export content.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should the project make possible?
      placeholder: Describe the teacher or contributor outcome.
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Teacher workflow impact
      description: How does this fit material planning, curriculum-grounded lesson design, Obsidian memory, document export, Schriftwesen, or handover?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Primary area
      options:
        - Curriculum grounding
        - Lesson planning
        - Document export
        - Obsidian vault or memory workflow
        - Schriftwesen or handover
        - Local setup or Docker Compose
        - Contributor workflow
        - Release packaging
        - Other
    validations:
      required: true
  - type: dropdown
    id: agent_os_scope
    attributes:
      label: Agent-OS scope
      description: Larger or cross-cutting changes need an Agent-OS spec before implementation.
      options:
        - Needs Agent-OS spec
        - Existing Agent-OS spec covers this
        - Small direct fix or docs-only change
        - Not sure
    validations:
      required: true
  - type: textarea
    id: privacy_release
    attributes:
      label: Privacy, security, and release-boundary impact
      description: State whether the feature touches sensitive data boundaries, cloud/export behavior, vault structure, release packaging, or security posture.
      placeholder: |
        Privacy impact:
        Security impact:
        Release package impact:
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What observable behavior would make this done?
      placeholder: |
        - ...
        - ...
    validations:
      required: false
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary check
      options:
        - label: This request does not require storing or normalizing sensitive student data.
          required: true
        - label: This request keeps curriculum grounding before generative output where lesson content is involved.
          required: true
        - label: This request keeps default behavior local-first and does not require external APIs by default.
          required: true
