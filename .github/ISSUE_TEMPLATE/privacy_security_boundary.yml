name: Privacy, security, or release boundary
description: Raise a non-sensitive concern about project privacy, security posture, or release packaging.
title: "[Boundary]: "
labels:
  - privacy
body:
  - type: markdown
    attributes:
      value: |
        Do not report secrets, credentials, exploitable vulnerability details, student data, confidential school documents, or private local files in a public issue. For a concrete vulnerability, contact the maintainer privately instead of publishing details.
  - type: dropdown
    id: concern_area
    attributes:
      label: Concern area
      description: If this is security-relevant, maintainers can add the security label during triage.
      options:
        - Privacy boundary
        - Security posture
        - Release package boundary
        - Vault or memory indexing boundary
        - Cloud/export integration boundary
        - Curriculum or material licensing boundary
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the concern without sensitive details.
    validations:
      required: true
  - type: textarea
    id: affected_area
    attributes:
      label: Affected area
      description: List public files, workflows, or docs involved.
      placeholder: |
        docs/privacy-boundary.md
        scripts/build_release.py
        vault/Wiki workflow
    validations:
      required: false
  - type: textarea
    id: expected_boundary
    attributes:
      label: Expected boundary
      description: What boundary or safeguard should the project preserve?
    validations:
      required: true
  - type: textarea
    id: proposed_resolution
    attributes:
      label: Proposed resolution
      description: Optional safe remediation idea that does not expose sensitive details.
    validations:
      required: false
  - type: checkboxes
    id: public_safety
    attributes:
      label: Public issue safety
      options:
        - label: I did not include secrets, credentials, vulnerability exploit steps, student data, confidential school documents, private vault/export content, or copyrighted textbook content.
          required: true
