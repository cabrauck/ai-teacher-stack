services:
  librechat:
    image: registry.librechat.ai/danny-avila/librechat-dev:latest
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3080
      DOMAIN_CLIENT: ${DOMAIN_CLIENT:-http://localhost:3080}
      DOMAIN_SERVER: ${DOMAIN_SERVER:-http://localhost:3080}
      CONFIG_PATH: /app/librechat.yaml
      MONGO_URI: mongodb://librechat-mongodb:27017/LibreChat
      SEARCH: "false"
      APP_TITLE: ${APP_TITLE:-ai-teacher-stack}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      ALLOW_EMAIL_LOGIN: ${ALLOW_EMAIL_LOGIN:-true}
      ALLOW_SOCIAL_LOGIN: ${ALLOW_SOCIAL_LOGIN:-false}
      ALLOW_SOCIAL_REGISTRATION: ${ALLOW_SOCIAL_REGISTRATION:-false}
      ALLOW_PASSWORD_RESET: ${ALLOW_PASSWORD_RESET:-false}
      ALLOW_UNVERIFIED_EMAIL_LOGIN: ${ALLOW_UNVERIFIED_EMAIL_LOGIN:-true}
      CREDS_KEY: ${CREDS_KEY:-1111111111111111111111111111111111111111111111111111111111111111}
      CREDS_IV: ${CREDS_IV:-22222222222222222222222222222222}
      JWT_SECRET: ${JWT_SECRET:-change-me-local-jwt-secret-before-serious-use}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-local-refresh-secret-before-serious-use}
    ports:
      - "${HOST_LIBRECHAT_PORT:-3080}:3080"
    volumes:
      - ./.env:/app/.env
      - ./integrations/librechat/librechat.yaml:/app/librechat.yaml:ro
      - ./.librechat/images:/app/client/public/images
      - ./.librechat/uploads:/app/uploads
      - ./.librechat/logs:/app/logs
    depends_on:
      teacher-tools-mcp:
        condition: service_started
      claude-os:
        condition: service_started
      claude-os-frontend:
        condition: service_started
      librechat-mongodb:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  teacher-tools:
    build:
      context: ./services/teacher_tools
    env_file:
      - .env
    environment:
      STACK_PUBLIC_HOST: ${STACK_PUBLIC_HOST:-localhost}
      HOST_LIBRECHAT_PORT: ${HOST_LIBRECHAT_PORT:-3080}
      HOST_TEACHER_TOOLS_PORT: ${HOST_TEACHER_TOOLS_PORT:-8010}
      HOST_CLAUDE_OS_PORT: ${HOST_CLAUDE_OS_PORT:-8051}
      HOST_CLAUDE_OS_FRONTEND_PORT: ${HOST_CLAUDE_OS_FRONTEND_PORT:-5173}
      CLAUDE_OS_URL: http://claude-os:8051
      CLAUDE_OS_FRONTEND_URL: http://claude-os-frontend:5173
      CLAUDE_OS_REDIS_HOST: claude-os-redis
      CLAUDE_OS_REDIS_PORT: 6379
      CLAUDE_OS_INDEX_ROOT: /app/vault/Wiki
      LIBRECHAT_URL: http://librechat:3080
      OLLAMA_BASE_URL: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      MEMORY_REQUIRE_PRIVACY_VALIDATION: "true"
    ports:
      - "${HOST_TEACHER_TOOLS_PORT:-8010}:8010"
    volumes:
      - ./data:/app/data
      - ./vault:/app/vault
      - ./exports:/app/exports
    depends_on:
      claude-os:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["uv", "run", "uvicorn", "teacher_tools.api:app", "--host", "0.0.0.0", "--port", "8010"]

  teacher-tools-mcp:
    build:
      context: ./services/teacher_tools
    env_file:
      - .env
    environment:
      STACK_PUBLIC_HOST: ${STACK_PUBLIC_HOST:-localhost}
      HOST_LIBRECHAT_PORT: ${HOST_LIBRECHAT_PORT:-3080}
      HOST_TEACHER_TOOLS_PORT: ${HOST_TEACHER_TOOLS_PORT:-8010}
      HOST_CLAUDE_OS_PORT: ${HOST_CLAUDE_OS_PORT:-8051}
      HOST_CLAUDE_OS_FRONTEND_PORT: ${HOST_CLAUDE_OS_FRONTEND_PORT:-5173}
      CLAUDE_OS_URL: http://claude-os:8051
      CLAUDE_OS_FRONTEND_URL: http://claude-os-frontend:5173
      CLAUDE_OS_REDIS_HOST: claude-os-redis
      CLAUDE_OS_REDIS_PORT: 6379
      CLAUDE_OS_INDEX_ROOT: /app/vault/Wiki
      LIBRECHAT_URL: http://librechat:3080
      OLLAMA_BASE_URL: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      TEACHER_TOOLS_MCP_HOST: 0.0.0.0
      TEACHER_TOOLS_MCP_PORT: 8020
      MEMORY_REQUIRE_PRIVACY_VALIDATION: "true"
    expose:
      - "8020"
    volumes:
      - ./data:/app/data
      - ./vault:/app/vault
      - ./exports:/app/exports
    depends_on:
      claude-os:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["uv", "run", "python", "-m", "teacher_tools.mcp_server"]

  claude-os:
    build:
      context: ./integrations/claude-os
      args:
        CLAUDE_OS_COMMIT: ee7b62bc5bf36541018a1c14592bcac2b59022f9
    env_file:
      - .env
    environment:
      CLAUDE_OS_PROVIDER: ${CLAUDE_OS_PROVIDER:-local}
      MCP_SERVER_HOST: 0.0.0.0
      MCP_SERVER_PORT: 8051
      SQLITE_DB_PATH: /workspace/.claude-os/data/claude-os.db
      UPLOAD_DIR: /workspace/.claude-os/uploads
      REDIS_HOST: claude-os-redis
      REDIS_PORT: 6379
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      CLAUDE_OS_BOOTSTRAP_WIKI_KB: ${CLAUDE_OS_BOOTSTRAP_WIKI_KB:-true}
      CLAUDE_OS_BOOTSTRAP_SYNC: ${CLAUDE_OS_BOOTSTRAP_SYNC:-true}
      CLAUDE_OS_PROJECT_NAME: ${CLAUDE_OS_PROJECT_NAME:-ai-teacher-stack}
      CLAUDE_OS_WORKSPACE_PATH: /workspace
      CLAUDE_OS_WIKI_PATH: /workspace/vault/Wiki
      CLAUDE_OS_WIKI_KB_NAME: ${CLAUDE_OS_WIKI_KB_NAME:-ai-teacher-stack-wiki}
      CLAUDE_OS_WIKI_MCP_TYPE: ${CLAUDE_OS_WIKI_MCP_TYPE:-project_memories}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3080,http://localhost:8051,http://localhost:5173,http://localhost:8010,http://127.0.0.1:3080,http://127.0.0.1:8051,http://127.0.0.1:5173,http://127.0.0.1:8010}
    ports:
      - "${HOST_CLAUDE_OS_PORT:-8051}:8051"
    volumes:
      - ./vault:/workspace/vault
      - ./.claude-os:/workspace/.claude-os
    depends_on:
      claude-os-redis:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  claude-os-frontend:
    build:
      context: ./integrations/claude-os
      dockerfile: frontend.Dockerfile
      args:
        CLAUDE_OS_COMMIT: ee7b62bc5bf36541018a1c14592bcac2b59022f9
    env_file:
      - .env
    environment:
      CLAUDE_OS_API_INTERNAL_URL: http://claude-os:8051
      VITE_API_URL: http://${STACK_PUBLIC_HOST:-localhost}:${HOST_CLAUDE_OS_PORT:-8051}
    ports:
      - "${HOST_CLAUDE_OS_FRONTEND_PORT:-5173}:5173"
    depends_on:
      claude-os:
        condition: service_started

  claude-os-redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./.claude-os/redis:/data

  librechat-mongodb:
    image: mongo:8.0.20
    command: mongod --noauth
    volumes:
      - ./.librechat/mongodb:/data/db

  qdrant:
    image: qdrant/qdrant:v1.15.4
    profiles: ["rag"]
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
