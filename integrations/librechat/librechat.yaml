version: 1.3.5
cache: true

interface:
  privacyPolicy:
    externalUrl: "http://localhost:3080"
    openNewTab: false
  termsOfService:
    externalUrl: "http://localhost:3080"
    openNewTab: false
  mcpServers:
    enabled: true

endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "openai/gpt-4.1-mini"
        fetch: true
      titleConvo: true
      titleModel: "openai/gpt-4.1-mini"
      dropParams:
        - "stop"
      modelDisplayLabel: "OpenRouter"
  agents:
    disableBuilder: false
    capabilities:
      - "artifacts"
      - "context"

mcpSettings:
  allowedAddresses:
    - "teacher-tools-mcp:8020"
    - "claude-os:8051"

mcpServers:
  teacher-tools:
    type: streamable-http
    url: "http://teacher-tools-mcp:8020/mcp"
    timeout: 30000
    initTimeout: 30000
    chatMenu: true
    serverInstructions: true
  claude-os-memory:
    type: streamable-http
    url: "http://claude-os:8051"
    timeout: 30000
    initTimeout: 30000
    chatMenu: true
    serverInstructions: true

modelSpecs:
  enforce: false
  list:
    - name: "teacher-material-assistant"
      label: "Teacher Material Assistant"
      artifacts: true
      mcpServers:
        - "teacher-tools"
        - "claude-os-memory"
      preset:
        endpoint: "OpenRouter"
        model: "openai/gpt-4.1-mini"
        modelLabel: "OpenRouter"
