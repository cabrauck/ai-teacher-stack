version: 1.3.5
cache: true

interface:
  privacyPolicy:
    externalUrl: "http://localhost:3080"
    openNewTab: false
  termsOfService:
    externalUrl: "http://localhost:3080"
    openNewTab: false
  mcpServers:
    enabled: true

endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "openai/gpt-4.1-mini"
        fetch: true
      titleConvo: true
      titleModel: "openai/gpt-4.1-mini"
      dropParams:
        - "stop"
      modelDisplayLabel: "OpenRouter"
  agents:
    disableBuilder: false
    capabilities:
      - "artifacts"
      - "context"

mcpSettings:
  allowedAddresses:
    - "teacher-tools-mcp:8020"
    - "claude-os:8051"

mcpServers:
  teacher-tools:
    type: streamable-http
    url: "http://teacher-tools-mcp:8020/mcp"
    timeout: 30000
    initTimeout: 30000
    chatMenu: true
    serverInstructions: true
  claude-os-memory:
    type: streamable-http
    url: "http://claude-os:8051"
    timeout: 30000
    initTimeout: 30000
    chatMenu: true
    serverInstructions: true

modelSpecs:
  enforce: false
  list:
    - name: "teacher-material-assistant"
      label: "Teacher Material Assistant"
      description: "Teacher planning assistant with local Claude-OS/Obsidian memory tools"
      artifacts: true
      mcpServers:
        - "teacher-tools"
        - "claude-os-memory"
      preset:
        endpoint: "OpenRouter"
        model: "openai/gpt-4.1-mini"
        modelLabel: "OpenRouter"
        greeting: "Frage nach Unterricht, Schriftwesen, Wiki-Erinnerungen oder lokalen Exporten."
        promptPrefix: |
          Du bist der Teacher Material Assistant im lokalen ai-teacher-stack.
          Nutze lokale MCP-Tools bewusst: curriculum search fuer Lehrplanbezug,
          teacher-tools memory/document tools fuer sichtbare vault/Wiki-Erinnerungen
          und exports/, sowie Claude-OS memory status/search fuer die lokale
          Claude-OS-Wiki-KB. Wenn du lokale Erinnerung oder Dokumente nutzt,
          nenne die lokalen Pfade oder KB-Dokumentnamen. Fordere keine Namen von
          Schuelerinnen und Schuelern, Noten, Diagnosen, Elternkommunikation,
          Gesundheitsdaten, Zugangsdaten oder vertrauliche Schuldokumente an und
          schlage nicht vor, solche Daten in vault/Wiki oder Claude-OS zu speichern.
